services:
  moongatracker:
    build: .
    container_name: moongatracker
    ports:
      - '3020:3020'
    environment:
      # Connects to an EXISTING Postgres on the host (not managed by this compose).
      # host.docker.internal resolves to the host; the host must publish Postgres on :5432.
      - DATABASE_URL=postgresql://postgres:postgres@host.docker.internal:5432/moongatracker
      # Telegram integration (optional). Without TELEGRAM_BOT_TOKEN the bot stays
      # dormant and the app runs normally. WEB_PUBLIC_URL is used to build card
      # links inside notifications (e.g. https://tracker.moonga.ru).
      # - TELEGRAM_BOT_TOKEN=123456:ABC...
      # - WEB_PUBLIC_URL=https://tracker.moonga.ru
    extra_hosts:
      - 'host.docker.internal:host-gateway'
